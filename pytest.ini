# pytest configuration for DeTaGrandMere
[pytest]
testpaths = tests
addopts = --tb=short -v
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    regression: marks regression tests against analytical baselines
    integration: marks integration tests
    unit: marks unit tests

# Coverage configuration
[coverage:run]
source = src
omit =
    */__pycache__/*
    tests/*
    */tests/*
    # Exclude modules that require external dependencies
    src/cad/opencascade_wrapper.py
    src/cad/cgal_meshing.py
    src/core/gpu_acceleration/*
    src/core/mpi_parallel.py
    src/core/fmm/*
    src/core/hybrid_mom_fem.py
    src/core/solver_integration.py
    src/utils/documentation.py
    src/utils/sphinx_docs.py
    src/utils/release.py
    src/utils/version_history.py
    src/utils/cli_parser.py

[coverage:report]
# Target 90% coverage for core modules only
fail_under = 25
show_missing = true
skip_covered = true
